<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Cleaner - Step 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding-top: 50px;
    margin: 0;
    /* Background image with gradient overlay */
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                url('{{ url_for("static", filename="files/1.jpg") }}') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

        .container {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 16px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        h2 {
            color: #00aaff;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            border: none;
        }
        .btn-success {
            background: linear-gradient(90deg, #28a745, #78c850);
            border: none;
        }
        .ml-models .btn {
            margin: 5px;
            background: linear-gradient(90deg, #006400, #28a745);
            border: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            color: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: rgba(0,170,255,0.3);
        }
        tr:nth-child(even) {
            background-color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload CSV to Clean (Step-2)</h2>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data" class="mt-3">
            <input type="file" name="file" required class="form-control">
            <button type="submit" class="btn btn-primary mt-2">Upload & Clean</button>
        </form>

        <!-- Messages -->
        {% if message %}
            <div class="alert alert-info mt-3">{{ message }}</div>
        {% endif %}

        <!-- Download Cleaned CSV -->
        {% if cleaned_file_link %}
            <a href="{{ cleaned_file_link }}" class="btn btn-success mt-2" download>Download Cleaned CSV</a>
        {% endif %}

        <!-- Preview Table -->
        {% if preview %}
            <h4 class="mt-4">Preview of Cleaned Data:</h4>
            {{ preview|safe }}
        {% endif %}

        <!-- ML Models for Next Step -->
        <h4 class="mt-4">Choose an ML Model for Step-3:</h4>
        <div class="ml-models">
            <button class="btn">Random Forest</button>
            <button class="btn">XGBoost</button>
            <button class="btn">Decision Tree</button>
            <button class="btn">Logistic Regression</button>
            <button class="btn">SVM</button>
        </div>
    </div>
</body>
</html>
